name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:
            - Correctness and logic bugs
            - Security issues (injection, secrets, unsafe deserialization)
            - Python best practices (PEP 8, type hints, idiomatic patterns)
            - Test coverage for new code
            - Error handling and edge cases
            - Performance concerns

            Use `gh pr comment` to post a single consolidated review comment.
            Use inline review comments (`gh api`) only for specific line-level issues.
            Be concise, direct, and constructive. Skip nitpicks on style already handled by ruff.
          claude_args: |
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(gh search:*)"
